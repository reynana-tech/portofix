{% extends "admin/base.html" %}
{% block title %}Skill{% endblock %}
{% block page_title %}Kelola Skill{% endblock %}

{% block content %}
<div class="card">
    <div class="section-header">
        <span class="section-title">Data Skill</span>
        <button class="btn btn-primary btn-sm" onclick="openModal('skillModal'); resetForm()">+ Tambah Skill</button>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Nama</th><th>Kategori</th><th>Level</th><th>Aksi</th></tr>
            </thead>
            <tbody id="skillBody"></tbody>
        </table>
    </div>
</div>

<div id="skillModal" class="modal-backdrop">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Tambah Skill</span>
            <button class="modal-close" onclick="closeModal('skillModal')">✕</button>
        </div>
        <input type="hidden" id="skillId">
        <div class="form-group">
            <label>Nama Skill *</label>
            <input type="text" id="sName" class="form-control" placeholder="Python, JavaScript, ...">
        </div>
        <div class="form-group">
            <label>Kategori</label>
            <input type="text" id="sCategory" class="form-control" placeholder="Backend, Frontend, Database, Tools">
        </div>
        <div class="form-group">
            <label>Level (0–100): <span id="levelVal">80</span>%</label>
            <input type="range" id="sLevel" min="0" max="100" value="80"
                oninput="document.getElementById('levelVal').textContent = this.value"
                style="width:100%; accent-color:#8b78b8;">
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline btn-sm" onclick="closeModal('skillModal')">Batal</button>
            <button class="btn btn-primary btn-sm" onclick="saveSkill()">Simpan</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}<script src="{{ url_for('static', filename='admin/js/skills.js') }}"></script>{% endblock %}
