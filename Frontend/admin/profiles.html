{% extends "admin/base.html" %}
{% block title %}Profil{% endblock %}
{% block page_title %}Kelola Profil{% endblock %}

{% block content %}
<div class="card">
    <div class="section-header">
        <span class="section-title">Data Profil</span>
        <button class="btn btn-primary btn-sm" onclick="openModal('profileModal'); resetForm()">+ Tambah Profil</button>
    </div>
    <div class="table-wrap">
        <table id="profileTable">
            <thead>
                <tr>
                    <th>Foto</th><th>Nama</th><th>Title</th><th>Email</th><th>Lokasi</th><th>Aksi</th>
                </tr>
            </thead>
            <tbody id="profileBody"></tbody>
        </table>
    </div>
</div>

<!-- Upload Image Card -->
<div class="card" style="margin-top:20px;">
    <div class="section-header">
        <span class="section-title">Upload Foto ke Cloudinary</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
        <input type="file" id="imageFile" accept="image/*" class="form-control" style="max-width:300px;">
        <button class="btn btn-primary btn-sm" onclick="uploadImage()">Upload Gambar</button>
        <span id="uploadResult" style="font-size:13px; color:#6b6480;"></span>
    </div>
    <div id="uploadPreview" style="margin-top:14px; display:none;">
        <img id="uploadedImg" src="" style="max-height:120px; border-radius:8px; border:1.5px solid #e8e4f0;">
        <p id="uploadedUrl" style="font-size:12px; color:#8b83a4; margin-top:6px; word-break:break-all;"></p>
    </div>
</div>

<!-- Modal -->
<div id="profileModal" class="modal-backdrop">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Tambah Profil</span>
            <button class="modal-close" onclick="closeModal('profileModal')">✕</button>
        </div>
        <input type="hidden" id="profileId">
        <div class="form-group">
            <label>Nama Lengkap *</label>
            <input type="text" id="pName" class="form-control" placeholder="Nama Lengkap">
        </div>
        <div class="form-group">
            <label>Title / Jabatan</label>
            <input type="text" id="pTitle" class="form-control" placeholder="Full Stack Developer">
        </div>
        <div class="form-group">
            <label>Bio</label>
            <textarea id="pBio" class="form-control" rows="3" placeholder="Ceritakan sedikit tentang dirimu..."></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="pEmail" class="form-control">
            </div>
            <div class="form-group">
                <label>Telepon</label>
                <input type="text" id="pPhone" class="form-control">
            </div>
        </div>
        <div class="form-group">
            <label>Lokasi</label>
            <input type="text" id="pLocation" class="form-control" placeholder="Jakarta, Indonesia">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
            <div class="form-group">
                <label>GitHub URL</label>
                <input type="text" id="pGithub" class="form-control">
            </div>
            <div class="form-group">
                <label>LinkedIn URL</label>
                <input type="text" id="pLinkedin" class="form-control">
            </div>
        </div>
        <div class="form-group">
            <label>Instagram URL</label>
            <input type="text" id="pInstagram" class="form-control" placeholder="https://instagram.com/username">
        </div>
        <div class="form-group">
            <label>URL Foto (dari Cloudinary)</label>
            <input type="text" id="pPhoto" class="form-control" placeholder="https://res.cloudinary.com/...">
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline btn-sm" onclick="closeModal('profileModal')">Batal</button>
            <button class="btn btn-primary btn-sm" onclick="saveProfile()">Simpan</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}<script src="{{ url_for('static', filename='admin/js/profiles.js') }}"></script>{% endblock %}
