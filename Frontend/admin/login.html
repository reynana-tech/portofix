<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin Portofolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/login.css') }}">
    
</head>
<body>
    <div class="login-bg">
        <div class="login-orb orb-1"></div>
        <div class="login-orb orb-2"></div>
    </div>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">✿</div>
            <h1 class="login-title">Admin Panel</h1>
            <p class="login-sub">Masuk untuk mengelola portofolio Anda</p>
            <div id="login-error" class="login-error" style="display:none;"></div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-login" id="loginBtn" onclick="doLogin()">Masuk</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='admin/js/login.js') }}"></script>
</body>
</html>
